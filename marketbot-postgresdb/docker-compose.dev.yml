services:
  postgres:
    container_name: marketbot-db-pg-dev
    ports:
      - "5432:5432"

  pgadmin:
    container_name: marketbot-db-pgadmin-dev
    ports:
      - "5050:80"
    volumes:
      - ./pgadmin-servers.dev.json:/pgadmin4/servers.json

volumes:
  pgdata:
    name: pgdata-dev
  pgadmin-data:
    name: pgadmin-data-dev

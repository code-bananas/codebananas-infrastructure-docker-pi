services:
  postgres:
    image: postgres:16-alpine
    container_name: marketbot-db-pg-local
    platform: linux/arm64
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      MARKETBOT_DB_PASSWORD: ${MARKETBOT_DB_PASSWORD}
      MARKETBOT_DB_NAME: ${MARKETBOT_DB_NAME}

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: marketbot-db-pgadmin-local
    platform: linux/arm64
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}

    volumes:
    - pgadmin-data:/var/lib/pgadmin
    - ./pgadmin-servers.local.json:/pgadmin4/servers.json

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: pgdata-local
  pgadmin-data:
    name: pgadmin-data-local
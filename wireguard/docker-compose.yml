services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - SERVERURL=codebananas.com        # OR your public IP
      - SERVERPORT=51820
      - PEERS=1                       # Number of client profiles to auto-generate
      - PEERDNS=auto
      - ALLOWEDIPS=0.0.0.0/0          # Full tunnel for clients (can change later)
    ports:
      - 51820:51820/udp
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped

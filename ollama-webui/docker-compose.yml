services:
  webui:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
     - 9005:8080/tcp
    environment:
     - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - /srv/docker/ollama-webui/webui:/app/backend/data
    depends_on:
     - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
     - 11434:11434/tcp
    restart: unless-stopped
    volumes:
      - /srv/docker/ollama-webui/ollama:/root/.ollama
